name: Nested Eagle CI Pipeline (uwtools)

on:
  pull_request_review:
    types: [submitted]

concurrency:
  group: nested-eagle-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  run_pipeline:
    name: Run Nested EAGLE end-to-end on Ursa
    if: >-
      ${{
        github.event.review.state == 'approved' &&
        !contains(github.event.pull_request.labels.*.name, 'ci-running')
      }}
    runs-on: ursa
    timeout-minutes: 1440

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      # pull_request_review does not reliably support paths filters, so gate explicitly.
      - name: Gate on nested_eagle/ or src/ changes
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            let page = 1;
            const per_page = 100;
            const files = [];
            while (true) {
              const resp = await github.rest.pulls.listFiles({
                owner, repo, pull_number: pr.number, per_page, page
              });
              files.push(...resp.data.map(f => f.filename));
              if (resp.data.length < per_page) break;
              page += 1;
            }

            const relevant = files.some(f => f.startsWith("nested_eagle/") || f.startsWith("src/"));
            core.info(`Changed files: ${files.length}`);
            core.info(`Relevant changes: ${relevant}`);
            core.setOutput("relevant", relevant ? "true" : "false");

      - name: Skip (no relevant changes)
        if: steps.gate.outputs.relevant != 'true'
        run: |
          echo "No changes under nested_eagle/ or src/. Skipping."
          exit 0

      - name: Add ci-running label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: ci-running
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: actions/checkout cleans src/conda, so we recreate it as a symlink to a
      # persistent install on scratch. This avoids rebuilding conda/envs per CI run.
      - name: Ensure persistent conda and link src/conda
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/src"

          PERSIST="/scratch4/NAGAPE/epic/role-epic/miniconda"

          if [ ! -f "${PERSIST}/etc/profile.d/conda.sh" ]; then
            echo "Persistent conda not found at ${PERSIST}."
            echo "Provision it once on the runner with:"
            echo "  cd src && make env cudascript=ursa INSTALLDIR=${PERSIST}"
            exit 1
          fi

          rm -rf conda
          ln -s "${PERSIST}" conda
          test -f conda/etc/profile.d/conda.sh
          echo "Linked src/conda -> ${PERSIST}"

          # Fail fast if uwtools isn't installed in base env
          source conda/etc/profile.d/conda.sh
          conda activate base
          command -v uw >/dev/null || {
            echo "ERROR: 'uw' not found in the base environment of ${PERSIST}."
            echo "Run once on the runner:"
            echo "  cd src && make env cudascript=ursa INSTALLDIR=${PERSIST}"
            exit 1
          }
          uw --version || true

      - name: Run pipeline via src/Makefile + uwtools
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          INSTALLDIR: /scratch4/NAGAPE/epic/role-epic/miniconda
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/src"

          # ---- helpers ----
          slurm_wait() {
            local job_id="$1"
            local label="${2:-job}"
            local prev=""
            echo "Waiting for ${label} job ${job_id} ..."
            while true; do
              local state=""
              state="$(squeue -h -j "$job_id" -o "%T" 2>/dev/null || true)"
              if [[ -z "$state" ]]; then
                state="$(sacct -j "$job_id" --format=State --noheader 2>/dev/null | head -n1 | awk '{print $1}')"
                state="${state:-UNKNOWN}"
              fi
              if [[ "$state" != "$prev" ]]; then
                echo "${label} (${job_id}) state: ${state}"
                prev="$state"
              fi
              case "$state" in
                COMPLETED) echo "${label} (${job_id}) COMPLETED"; break ;;
                FAILED*|CANCELLED*|TIMEOUT*|NODE_FAIL*|OUT_OF_MEMORY*)
                  echo "${label} (${job_id}) terminal failure: ${state}"
                  return 1
                  ;;
              esac
              sleep 20
            done
            return 0
          }

          wait_runscript_batch() {
            local dir="$1"
            local target="$2"
            local label="${3:-$target}"

            local submit="${dir}/runscript.${target}.submit"
            local done="${dir}/runscript.${target}.done"
            local out="${dir}/runscript.${target}.out"

            if [[ ! -f "$submit" ]]; then
              echo "ERROR: Missing submit file: $submit"
              ls -la "$dir" || true
              exit 1
            fi

            local job_id
            job_id="$(grep -oE '[0-9]+' "$submit" | tail -n1)"
            if [[ -z "${job_id:-}" ]]; then
              echo "ERROR: Could not parse numeric job id from $submit"
              cat "$submit" || true
              exit 1
            fi

            if ! slurm_wait "$job_id" "$label"; then
              [[ -f "$out" ]] && tail -n 200 "$out" || true
              exit 1
            fi

            if [[ ! -f "$done" ]]; then
              echo "ERROR: Job completed but .done marker missing: $done"
              [[ -f "$out" ]] && tail -n 200 "$out" || true
              exit 1
            fi
          }

          # ---- build config ----
          EXP="ci-pr${PR_NUM}-$(echo "$SHA" | cut -c1-7)"
          echo "Experiment name: $EXP"

          make config compose=base:ursa INSTALLDIR="${INSTALLDIR}" > eagle.yaml

          SRC_ABS="${GITHUB_WORKSPACE}/src"
          sed -i "s|^\\(  base:\\s*\\).*|\\1${SRC_ABS}|" eagle.yaml
          sed -i "s|^\\(  experiment_name:\\s*\\).*|\\1${EXP}|" eagle.yaml

          make validate config=eagle.yaml INSTALLDIR="${INSTALLDIR}"

          RUNROOT="${SRC_ABS}/run/${EXP}"

          # ---- pipeline steps ----
          make grids-and-meshes config=eagle.yaml INSTALLDIR="${INSTALLDIR}"

          make zarr-gfs config=eagle.yaml INSTALLDIR="${INSTALLDIR}"
          wait_runscript_batch "${RUNROOT}/data" "zarr-gfs" "Zarr GFS"

          make zarr-hrrr config=eagle.yaml INSTALLDIR="${INSTALLDIR}"
          wait_runscript_batch "${RUNROOT}/data" "zarr-hrrr" "Zarr HRRR"

          test -d "${RUNROOT}/data/gfs.zarr"  || { echo "Missing ${RUNROOT}/data/gfs.zarr"; exit 1; }
          test -d "${RUNROOT}/data/hrrr.zarr" || { echo "Missing ${RUNROOT}/data/hrrr.zarr"; exit 1; }

          make training config=eagle.yaml INSTALLDIR="${INSTALLDIR}"
          wait_runscript_batch "${RUNROOT}/training" "training" "Training"

          make inference config=eagle.yaml INSTALLDIR="${INSTALLDIR}"
          wait_runscript_batch "${RUNROOT}/inference" "inference" "Inference"

          make prewxvx-global config=eagle.yaml INSTALLDIR="${INSTALLDIR}"
          make prewxvx-lam    config=eagle.yaml INSTALLDIR="${INSTALLDIR}"

          make vx-grid-global config=eagle.yaml INSTALLDIR="${INSTALLDIR}"
          wait_runscript_batch "${RUNROOT}/vx/grid2grid/global" "wxvx" "VX grid2grid global"

          make vx-grid-lam config=eagle.yaml INSTALLDIR="${INSTALLDIR}"
          wait_runscript_batch "${RUNROOT}/vx/grid2grid/lam" "wxvx" "VX grid2grid lam"

          make vx-obs-global config=eagle.yaml INSTALLDIR="${INSTALLDIR}"
          wait_runscript_batch "${RUNROOT}/vx/grid2obs/global" "wxvx" "VX grid2obs global"

          make vx-obs-lam config=eagle.yaml INSTALLDIR="${INSTALLDIR}"
          wait_runscript_batch "${RUNROOT}/vx/grid2obs/lam" "wxvx" "VX grid2obs lam"

          # Artifact checks (minimal “golden signals”)
          find "${RUNROOT}/inference" -type f -name "*.nc" -print -quit | grep -q . || {
            echo "ERROR: No inference NetCDF outputs found under ${RUNROOT}/inference"
            exit 1
          }

          find "${RUNROOT}/vx" -type f -name "*.png" -print -quit | grep -q . || {
            echo "ERROR: No verification PNGs found under ${RUNROOT}/vx"
            exit 1
          }

          find "${RUNROOT}/vx" -type f -name "*.stat" -print -quit | grep -q . || {
            echo "ERROR: No verification .stat outputs found under ${RUNROOT}/vx"
            exit 1
          }

          echo "Nested EAGLE CI pipeline completed successfully."

  cleanup_label:
    name: Cleanup ci-running label
    runs-on: ubuntu-latest
    if: always()
    needs: [run_pipeline]
    steps:
      - name: Remove ci-running label
        uses: mondeja/remove-labels-gh-action@v2.0.0
